<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>QR Party — Download</title>
<meta name="description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>

<!-- Open Graph / social preview -->
<meta property="og:title" content="QR Party — Download"/>
<meta property="og:description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://partywithqr.com/download"/>
<meta property="og:site_name" content="QR Party"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="QR Party — Download"/>
<meta name="twitter:description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #0F0D1A;
    --card: #1A1728;
    --border: rgba(255,255,255,0.08);
    --purple: #9C7FD4;
    --purple-deep: #7B5EA7;
    --gold: #C8922A;
    --fg: #F5F2FA;
    --muted: #9A93A8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Nunito', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    overflow-x: hidden;
  }

  /* Soft purple glow behind the card. */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 30%, rgba(156,127,212,0.18), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(200,146,42,0.10), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .wordmark {
    font-family: 'Fredoka One', system-ui, sans-serif;
    font-size: clamp(44px, 12vw, 64px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin-bottom: 14px;
  }
  .wordmark .accent { color: var(--purple); }

  .tag {
    font-size: clamp(15px, 4.2vw, 18px);
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 40px;
    letter-spacing: 0.01em;
  }
  .tag .gold { color: var(--gold); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 28px 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    margin-bottom: 28px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 18px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    color: white;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    border: none;
    cursor: pointer;
  }
  .btn:active { transform: translateY(1px); opacity: 0.9; }
  .btn + .btn { margin-top: 12px; }

  .btn-ios {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-deep) 100%);
    box-shadow: 0 10px 24px rgba(156,127,212,0.32);
  }
  .btn-android {
    background: linear-gradient(135deg, var(--gold) 0%, #A87509 100%);
    box-shadow: 0 10px 24px rgba(200,146,42,0.32);
  }
  .btn-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .btn-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.1;
  }
  .btn-text .small {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.85;
    letter-spacing: 0.04em;
  }
  .btn-text .big {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.01em;
  }

  .redirect-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 18px;
  }
  .redirect-note .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(156,127,212,0.3);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    position: relative;
    z-index: 1;
    margin-top: 48px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.02em;
  }
  footer .heart { color: var(--gold); }

  /* Hide both buttons until the JS device check has resolved — avoids
     flash-of-content on mobile right before the auto-redirect fires. */
  .stores { display: none; }
  .stores.show { display: block; }

  /* Reduce motion for users who prefer it. */
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
    .btn { transition: none; }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="wordmark">QR<span class="accent">Party</span></div>
    <div class="tag">One QR. <span class="gold">Every RSVP</span> handled.</div>

    <!-- Mobile redirect message — replaced/hidden after JS evaluates. -->
    <div id="redirect" class="redirect-note" style="display:none">
      <span class="spinner"></span> Opening the store…
    </div>

    <!-- Desktop / fallback view: both store buttons. -->
    <div id="stores" class="stores">
      <div class="card">
        <div class="card-label">Get the App</div>

        <!-- IOS: swap [PLACEHOLDER_ID] with the real App Store numeric id once iOS ships. -->
        <a id="btn-ios" class="btn btn-ios" href="https://apps.apple.com/app/qr-party/id[PLACEHOLDER_ID]" rel="noopener">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M16.365 1.43c0 1.14-.493 2.27-1.18 3.084-.74.873-1.964 1.553-2.96 1.474-.116-1.116.46-2.27 1.122-3.018.745-.84 2.04-1.485 3.018-1.54zM21.5 17.51c-.55 1.27-.808 1.84-1.518 2.96-.99 1.56-2.39 3.5-4.13 3.518-1.55.018-1.948-1-4.05-.99-2.103.012-2.54 1.008-4.092.99-1.74-.018-3.066-1.77-4.057-3.33C1.45 17.01.36 11.55 2.51 7.85c1.51-2.6 3.91-4.13 6.16-4.13 2.29 0 3.73 1.255 5.62 1.255 1.84 0 2.96-1.258 5.6-1.258 2 .015 4.13 1.09 5.64 2.96-4.94 2.71-4.13 9.79.97 12.34z"/>
          </svg>
          <span class="btn-text">
            <span class="small">Download on the</span>
            <span class="big">App Store</span>
          </span>
        </a>

        <a id="btn-android" class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.qrparty.app" rel="noopener">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.609 1.814 13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734c0-.378.226-.715.61-.92zM14.5 12.708 17.6 15.81l-12.27 7.022 9.17-10.124zM20.16 10.81c.5.291.83.825.83 1.41s-.33 1.119-.83 1.41l-2.582 1.482L14.5 12l3.078-3.108 2.582 1.918zM5.33 1.168 17.6 8.19l-3.1 3.1L5.33 1.168z"/>
          </svg>
          <span class="btn-text">
            <span class="small">Get it on</span>
            <span class="big">Google Play</span>
          </span>
        </a>
      </div>
    </div>
  </div>

  <footer>
    Built in Seaside, CA<span class="heart"> · </span>QR Party LLC
  </footer>

  <script>
    // Minimal UA sniff — good enough for the redirect heuristic. Detect
    // before paint so we don't flash both buttons on a phone right
    // before the auto-redirect fires.
    (function () {
      var ua = navigator.userAgent || '';
      // iPadOS 13+ reports as Mac with touch events; treat that as iOS too.
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
      var isAndroid = /android/i.test(ua);

      // PLACEHOLDER iOS App Store URL — swap the numeric id once iOS goes live.
      var IOS_URL     = 'https://apps.apple.com/app/qr-party/id[PLACEHOLDER_ID]';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.qrparty.app';

      var redirectEl = document.getElementById('redirect');
      var storesEl   = document.getElementById('stores');

      if (isIOS) {
        redirectEl.style.display = 'block';
        // Tiny delay so the spinner gets a chance to paint and the
        // redirect feels intentional, not jarring.
        setTimeout(function () { window.location.replace(IOS_URL); }, 120);
      } else if (isAndroid) {
        redirectEl.style.display = 'block';
        setTimeout(function () { window.location.replace(ANDROID_URL); }, 120);
      } else {
        // Desktop / unknown — show both store buttons, no redirect.
        storesEl.classList.add('show');
      }
    })();
  </script>
</body>
</html>
