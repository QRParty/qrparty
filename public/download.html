<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>QR Party — Download</title>
<meta name="description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>

<!-- Open Graph / social preview -->
<meta property="og:title" content="QR Party — Download"/>
<meta property="og:description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://partywithqr.com/download"/>
<meta property="og:site_name" content="QR Party"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="QR Party — Download"/>
<meta name="twitter:description" content="One QR. Every RSVP handled. Get QR Party on iOS or Android."/>

<!-- Mobile UA detection — happens BEFORE the body so iOS/Android visitors
     never see a flash of the desktop fallback. window.location.replace
     skips a back-button entry for the download page itself. -->
<script>
  (function () {
    var ua = navigator.userAgent || '';
    // iPad on iOS 13+ reports "Macintosh" in its UA, so the maxTouchPoints
    // check rescues those visitors from the desktop fallback.
    var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (/Macintosh/.test(ua) && typeof document !== 'undefined' && 'ontouchend' in document);
    var isAndroid = /Android/i.test(ua);
    if (isIOS) {
      window.location.replace('https://apps.apple.com/app/qr-party/id6766116501');
    } else if (isAndroid) {
      window.location.replace('https://play.google.com/store/apps/details?id=com.qrparty.app');
    }
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
  :root {
    --dark:    #2D3047;
    --surface: #F8F7FC;
    --purple:  #9C7FD4;
    --gold:    #C8922A;
    --muted:   #8892A4;
    --card:    #FFFFFF;
    --border:  rgba(45, 48, 71, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--surface);
    color: var(--dark);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    background-image:
      radial-gradient(circle at 12% 8%,  rgba(156, 127, 212, 0.16) 0%, transparent 36%),
      radial-gradient(circle at 88% 92%, rgba(200, 146, 42, 0.12) 0%, transparent 38%);
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px 32px 36px;
    text-align: center;
    box-shadow:
      0 24px 64px rgba(45, 48, 71, 0.10),
      0 4px 16px rgba(45, 48, 71, 0.05);
  }

  .wordmark {
    font-family: 'Fredoka One', cursive;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.5px;
    margin: 0 0 4px;
  }
  .wordmark .qr   { color: var(--dark); }
  .wordmark .party { color: var(--purple); font-weight: 300; }

  .tagline {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 32px;
  }
  .tagline .dot {
    display: inline-block;
    margin: 0 6px;
    transform: translateY(-1px);
    color: var(--purple);
  }

  .headline {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    line-height: 1.2;
    color: var(--dark);
    margin: 0 0 12px;
  }

  .subhead {
    font-size: 15px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 28px;
  }

  .badges {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    margin: 0 0 24px;
  }

  .badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 20px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.2px;
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .badge:hover  { transform: translateY(-1px); }
  .badge:active { transform: translateY(0); }

  .badge.appstore {
    background: var(--dark);
    color: #fff;
    box-shadow: 0 6px 18px rgba(45, 48, 71, 0.25);
  }
  .badge.appstore:hover {
    box-shadow: 0 10px 26px rgba(45, 48, 71, 0.32);
  }

  .badge.playstore {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 6px 18px rgba(156, 127, 212, 0.35);
  }
  .badge.playstore:hover {
    box-shadow: 0 10px 26px rgba(156, 127, 212, 0.45);
  }

  .badge .label-small {
    display: block;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 10.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.78;
    margin-bottom: 1px;
  }
  .badge .label-big {
    display: block;
    font-family: 'Fredoka One', cursive;
    font-weight: 400;
    font-size: 18px;
    letter-spacing: 0.1px;
  }
  .badge .label-stack {
    text-align: left;
    line-height: 1.1;
  }

  .badge svg {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 28px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.2px;
  }
  .footer a {
    color: var(--purple);
    text-decoration: none;
    font-weight: 700;
  }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 380px) {
    .wordmark   { font-size: 38px; }
    .headline   { font-size: 22px; }
    .card       { padding: 32px 24px 28px; border-radius: 24px; }
  }
</style>
</head>
<body>
  <main class="card" aria-labelledby="headline">
    <h1 class="wordmark"><span class="qr">QR</span><span class="party">Party</span></h1>
    <p class="tagline">scan<span class="dot">·</span>party<span class="dot">·</span>connect</p>

    <h2 id="headline" class="headline">Get the QR Party app</h2>
    <p class="subhead">One QR. Every RSVP handled. Available on iOS and Android.</p>

    <div class="badges">
      <a class="badge appstore" href="https://apps.apple.com/app/qr-party/id6766116501" aria-label="Download QR Party on the App Store">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.07-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.46 1.58-1.5 3.14-.85 1.34-1.74 2.71-3.14 2.71-1.39 0-1.83-.88-3.41-.88-1.59 0-2.1.86-3.42.88-1.39.05-2.43-1.42-3.31-2.74-1.78-2.67-3.13-7.55-1.31-10.84.91-1.62 2.52-2.65 4.31-2.68 1.37-.03 2.65.92 3.4.92.74 0 2.32-1.13 3.91-.96.67.03 2.53.27 3.73 2.03-.09.06-2.22 1.3-2.2 3.85.03 3.05 2.66 4.05 2.69 4.07z"/>
        </svg>
        <span class="label-stack">
          <span class="label-small">Download on the</span>
          <span class="label-big">App Store</span>
        </span>
      </a>

      <a class="badge playstore" href="https://play.google.com/store/apps/details?id=com.qrparty.app" aria-label="Get QR Party on Google Play">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M3.609 1.814 13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893 2.302 2.302-10.937 6.232 8.635-8.534zm3.199-3.198 2.336 1.336c.781.445.781 1.575 0 2.022l-2.34 1.337-2.5-2.498 2.504-2.197zM5.864 2.658l10.927 6.215-2.302 2.302L5.864 2.658z"/>
        </svg>
        <span class="label-stack">
          <span class="label-small">Get it on</span>
          <span class="label-big">Google Play</span>
        </span>
      </a>
    </div>

    <div class="footer">
      &copy; 2026 QR Party LLC ·
      <a href="https://partywithqr.com">partywithqr.com</a>
    </div>
  </main>
</body>
</html>
