<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Party Business</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #2D3047;
      --bg-deep:     #22243A;
      --card:        #383B56;
      --card-raise:  #3E4163;
      --border:      #4A4E6B;
      --muted:       #A9A6B8;
      --purple:      #9C7FD4;
      --purple-deep: #6E4CAD;
      --gold:        #C8922A;
      --green:       #52796F;
      --green-light: #84A98C;
    }
    html { scroll-behavior: smooth; background: var(--bg); }
    body {
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(circle at 10% -10%, rgba(156,127,212,.12) 0%, transparent 55%),
        radial-gradient(circle at 90% 110%, rgba(110,76,173,.10) 0%, transparent 55%),
        var(--bg);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      background: rgba(45,48,71,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { display: flex; align-items: baseline; gap: 0; text-decoration: none; }
    .nav-logo .qr    { font-family: 'Fredoka One', cursive; font-size: 26px; color: white; letter-spacing: 1px; line-height: 1; }
    .nav-logo .party { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--purple); line-height: 1; }
    .nav-hint { font-size: 13px; color: var(--muted); font-weight: 500; }

    .state-screen {
      min-height: 70vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      text-align: center; padding: 40px 24px;
    }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: white; }
    .state-sub   { font-size: 15px; color: var(--muted); max-width: 320px; line-height: 1.6; }

    #biz-page { display: none; max-width: 720px; margin: 0 auto; padding: 20px 16px 56px; }

    .biz-hero {
      position: relative; overflow: hidden;
      border-radius: 22px;
      padding: 32px 26px 28px;
      margin-bottom: 16px;
      text-align: center;
      background:
        radial-gradient(circle at 85% 10%, rgba(156,127,212,.50) 0%, transparent 55%),
        radial-gradient(circle at 10% 110%, rgba(82,121,111,.45) 0%, transparent 60%),
        linear-gradient(145deg, #3B2F68 0%, #2B2A4E 50%, #252641 100%);
      border: 1px solid rgba(156,127,212,.22);
      box-shadow:
        0 18px 48px rgba(110,76,173,.28),
        inset 0 1px 0 rgba(255,255,255,.06);
    }
    .biz-badge {
      display: inline-block;
      background: rgba(156,127,212,.22);
      border: 1px solid rgba(156,127,212,.55);
      color: #E8DFFF;
      font-size: 10.5px; font-weight: 900; letter-spacing: 1.2px;
      padding: 4px 10px; border-radius: 50px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .biz-logo-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 16px;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
    }
    .biz-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .biz-logo-wrap .placeholder { font-size: 42px; }
    .biz-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(28px, 6.5vw, 40px); line-height: 1.05;
      letter-spacing: .5px; color: white; margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .biz-desc {
      font-size: 14.5px; color: rgba(255,255,255,.72);
      line-height: 1.6; max-width: 540px; margin: 0 auto;
    }

    .section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.6px; color: var(--muted);
      margin: 22px 4px 12px;
    }

    .event-card {
      display: block; text-decoration: none; color: inherit;
      background: linear-gradient(180deg, var(--card-raise) 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,.22);
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
      border-color: rgba(156,127,212,.45);
    }
    .event-card-row { display: flex; align-items: center; gap: 14px; }
    .event-emoji {
      width: 48px; height: 48px; border-radius: 13px;
      background: rgba(156,127,212,.18);
      border: 1px solid rgba(156,127,212,.32);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-title {
      font-size: 16px; font-weight: 800; color: white;
      line-height: 1.3; margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .event-meta {
      font-size: 12.5px; color: var(--muted); font-weight: 600;
      display: flex; flex-wrap: wrap; gap: 4px 10px;
    }
    .event-meta .dot { color: var(--border); }
    .event-chevron { color: var(--muted); flex-shrink: 0; font-size: 22px; }

    .empty-events {
      text-align: center;
      padding: 40px 24px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 16px;
      color: var(--muted);
    }
    .empty-events .icon { font-size: 38px; margin-bottom: 8px; }
    .empty-events .title { color: white; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .empty-events .sub { font-size: 13px; line-height: 1.5; }

    .page-footer {
      text-align: center; padding: 28px 24px 20px;
      font-size: 12px; color: var(--muted); font-weight: 500;
      border-top: 1px solid var(--border);
    }
    .page-footer a { color: var(--purple); text-decoration: none; font-weight: 700; }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2MJ1C69EPC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2MJ1C69EPC');
  </script>
  <script defer src="/js/analytics.js"></script>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><span class="qr">QR</span><span class="party">Party</span></a>
  <span class="nav-hint">Business</span>
</nav>

<div id="loading-state" class="state-screen">
  <div class="spinner"></div>
  <div class="state-title">Loading business…</div>
</div>

<div id="error-state" class="state-screen" style="display:none">
  <div style="font-size:48px">🔍</div>
  <div class="state-title">Business not found</div>
  <div class="state-sub">This business link may be invalid or the business may have been removed.</div>
  <a href="/" style="margin-top:8px;color:var(--purple);font-weight:700;font-size:14px;text-decoration:none">← Back to QR Party</a>
</div>

<div id="biz-page">

  <div class="biz-hero">
    <div class="biz-badge">Business</div>
    <div class="biz-logo-wrap" id="biz-logo-wrap">
      <span class="placeholder">🏢</span>
    </div>
    <div class="biz-name" id="biz-name"></div>
    <div class="biz-desc" id="biz-desc"></div>
  </div>

  <div class="section-title">Upcoming events</div>
  <div id="events-list"></div>

</div>

<div class="page-footer">
  Powered by <a href="/">QR Party</a> · www.partywithqr.com
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  console.log('[QRParty] biz page running');

  firebase.initializeApp({
    apiKey:            'AIzaSyDI8j_7H9VoIFMCwGdJzEij406ap_tRlcA',
    authDomain:        'qrparty-6e648.firebaseapp.com',
    projectId:         'qrparty-6e648',
    storageBucket:     'qrparty-6e648.firebasestorage.app',
    messagingSenderId: '478022847809',
    appId:             '1:478022847809:web:a75dfa45ddb28d043565c0',
  });

  var db = firebase.firestore();

  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function setText(id, val) { document.getElementById(id).textContent = val; }

  function formatDate(ts) {
    if (!ts) return 'Date TBD';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // /biz/{slug} — strip the prefix and any trailing slash. Lower-cased so a
  // user typing the URL with a stray capital still resolves; slugs are
  // canonicalised lowercase at provision time.
  var rawPath = window.location.pathname;
  var slug = rawPath.replace(/^\/biz\//, '').replace(/\/$/, '').toLowerCase();
  console.log('[QRParty] biz slug:', slug);

  if (!slug) {
    hide('loading-state');
    show('error-state');
  } else {
    // Anon-auth so the events.where(...) query passes the firestore.rules
    // isSignedIn() check on /events. Same pattern as event.html.
    firebase.auth().signInAnonymously()
      .then(function() {
        return db.collection('businesses').doc(slug).get();
      })
      .then(function(snap) {
        if (!snap || !snap.exists) {
          hide('loading-state');
          show('error-state');
          return null;
        }
        var d = snap.data();
        setText('biz-name', d.name || 'Business');
        if (d.description) {
          setText('biz-desc', d.description);
        } else {
          hide('biz-desc');
        }
        if (d.logoUrl) {
          var wrap = document.getElementById('biz-logo-wrap');
          wrap.innerHTML = '';
          var img = document.createElement('img');
          img.src = d.logoUrl;
          img.alt = (d.name || 'Business') + ' logo';
          wrap.appendChild(img);
        }
        document.title = (d.name || 'Business') + ' — QR Party';

        // Pull every event hosted by this business owner. Filter the
        // public-visible upcoming set client-side: the host may have
        // private + draft + archived events that we MUST never show
        // here. The server-side filter is the hostId match; everything
        // else is a client check below.
        return db.collection('events')
          .where('hostId', '==', d.ownerId)
          .get();
      })
      .then(function(eventsSnap) {
        if (!eventsSnap) return;
        var now = Date.now();
        var events = eventsSnap.docs
          .map(function(doc) { return Object.assign({ id: doc.id }, doc.data()); })
          .filter(function(e) {
            // Public business page rules — drop anything that shouldn't
            // be advertised. All four conditions must hold for an event
            // to show:
            //   • isPublic === true (the host opted in to listing it)
            //   • not a draft
            //   • not archived
            //   • date is in the future
            if (e.isPublic !== true) return false;
            if (e.isDraft === true) return false;
            if (e.isArchived === true) return false;
            if (!e.date) return false;
            var dt = e.date.toDate ? e.date.toDate() : new Date(e.date);
            return dt.getTime() >= now;
          })
          .sort(function(a, b) {
            var da = a.date.toDate ? a.date.toDate() : new Date(a.date);
            var dbb = b.date.toDate ? b.date.toDate() : new Date(b.date);
            return da - dbb;
          });
        renderEvents(events);
        hide('loading-state');
        show('biz-page');
      })
      .catch(function(err) {
        console.error('[QRParty] biz error:', err && err.code, err && err.message);
        hide('loading-state');
        show('error-state');
      });
  }

  function renderEvents(events) {
    var container = document.getElementById('events-list');
    if (!events || events.length === 0) {
      container.innerHTML =
        '<div class="empty-events">' +
          '<div class="icon">📅</div>' +
          '<div class="title">No upcoming events</div>' +
          '<div class="sub">Check back soon — new events will appear here.</div>' +
        '</div>';
      return;
    }
    container.innerHTML = events.map(function(e) {
      var emoji = escapeHtml(e.eventEmoji || '🎉');
      var title = escapeHtml(e.title || 'Untitled Event');
      var dateStr = escapeHtml(formatDate(e.date));
      var loc = e.location ? escapeHtml(e.location) : '';
      // Prefer the human-friendly /event/{shortCode} URL if we have one;
      // fall back to the raw doc id (event.html resolves both).
      var slugOrId = e.shortCode ? e.shortCode : e.id;
      return (
        '<a class="event-card" href="/event/' + encodeURIComponent(slugOrId) + '">' +
          '<div class="event-card-row">' +
            '<div class="event-emoji">' + emoji + '</div>' +
            '<div class="event-info">' +
              '<div class="event-title">' + title + '</div>' +
              '<div class="event-meta">' +
                '<span>' + dateStr + '</span>' +
                (loc ? '<span class="dot">·</span><span>' + loc + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="event-chevron">›</div>' +
          '</div>' +
        '</a>'
      );
    }).join('');
  }
</script>
</body>
</html>
