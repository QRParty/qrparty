workflows:
  ios-workflow:
    name: QR Party iOS
    max_build_duration: 120
    environment:
      flutter: 3.41.7
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
      - name: Patch gRPC-Core for Xcode Clang
        script: |
          FILE="ios/Pods/gRPC-Core/src/core/lib/promise/detail/basic_seq.h"
          if [ -f "$FILE" ]; then
            sed -i '' 's/Traits::template CallSeqFactory(/Traits::template CallSeqFactory<>(/g' "$FILE"
            echo "Patched $FILE"
          else
            echo "basic_seq.h not found - likely fixed upstream, skipping"
          fi
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app