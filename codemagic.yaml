workflows:
  ios-workflow:
    name: QR Party iOS
    max_build_duration: 120
    environment:
      flutter: 3.41.7
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
